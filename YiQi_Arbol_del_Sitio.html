<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>YiQi — Árboles (Sitio + Design System)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://diguardia.github.io/yiqi-imagen/styles.css">
<script src="https://diguardia.github.io/yiqi-imagen/yiqi-runtime.js" defer></script>
<style>
.wrap{max-width:1040px;margin:0 auto;padding:36px 24px 80px}
.head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.kicker{font:600 10px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--cyan)}
h1{font:800 28px/1.1 var(--display);letter-spacing:-.02em;margin:6px 0 4px}
.sub{font:400 13px var(--sans);color:var(--muted)}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.toolbar .sb-theme-switch{width:118px;margin-bottom:0}
.bars{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:18px 0}
.bars-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.legend{display:flex;flex-wrap:wrap;gap:8px}
.tree{display:flex;flex-direction:column;gap:14px}
.tree details{margin:0}.tree summary{list-style:none;cursor:pointer}.tree summary::-webkit-details-marker{display:none}
.root-node{margin-bottom:6px}
.group{border:1px solid transparent;background:var(--card-bg,var(--bg-elev));border-radius:var(--radius-lg);overflow:hidden}
.group>summary{display:flex;align-items:center;gap:10px;padding:14px 16px;font:700 14px var(--display)}
.group>summary:hover{background:var(--bg-soft)}
.caret{width:14px;height:14px;flex-shrink:0;color:var(--muted-2);transition:transform var(--tr)}
.group[open]>summary .caret{transform:rotate(90deg)}
.group-desc{font:400 11px var(--sans);color:var(--muted-2);margin-left:6px;font-weight:400}
.group-count{margin-left:auto;font:600 10px var(--mono);color:var(--muted-2);background:var(--bg-soft);padding:2px 8px;border-radius:var(--radius-pill)}
.group-body{padding:6px 14px 14px;display:flex;flex-direction:column;gap:4px}
.node{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);text-decoration:none;color:var(--text);transition:background var(--tr)}
.node:hover{background:var(--bg-soft)}
.node.sub{margin-left:18px;border-left:1px solid var(--line);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.node .nlabel{font:600 13px var(--sans)}
.node.sub .nlabel{font-weight:500;color:var(--muted)}
.node .npath{font:400 11px var(--mono);color:var(--muted-2)}
.node .badge{margin-left:auto}
.diagram-shell{border:1px solid transparent;background:var(--card-bg,var(--bg-elev));border-radius:var(--radius-lg);overflow:hidden}
.diagram-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:12px 14px;border-bottom:1px solid var(--line)}
.dg-hint{font:400 11px var(--mono);color:var(--muted-2)}
.zoomctl{display:inline-flex;gap:2px;align-items:center;background:var(--bg-elev-2);border-radius:var(--radius-pill);padding:2px}
.zoomctl button{width:30px;height:28px;border:none;background:transparent;color:var(--muted);border-radius:var(--radius-pill);cursor:pointer;font:600 14px var(--sans);display:grid;place-items:center;transition:background var(--tr),color var(--tr)}
.zoomctl button:hover{background:var(--bg-soft);color:var(--text)}
.map-viewport{position:relative;height:calc(100vh - 230px);min-height:520px;overflow:hidden;cursor:grab;background:radial-gradient(circle at 1px 1px, var(--line) 1px, transparent 0) 0 0/26px 26px}
.map-viewport.grabbing{cursor:grabbing}
#map{width:100%;height:100%;display:block;user-select:none}
.conn{fill:none;stroke:var(--line-strong);stroke-width:1.6;transition:stroke .18s ease,opacity .18s ease}
.node-g{cursor:pointer}
.node-g rect{rx:9;ry:9;transition:opacity .18s ease}
.node-g text{font:600 11.5px var(--sans);dominant-baseline:central;pointer-events:none}
.st-pub rect{fill:var(--green-soft)}.st-pub .ntxt{fill:var(--green)}
.st-pre rect{fill:var(--amber-soft)}.st-pre .ntxt{fill:var(--amber)}
.st-draft rect{fill:var(--cyan-soft)}.st-draft .ntxt{fill:var(--cyan)}
.st-sys rect{fill:var(--bg-soft)}.st-sys .ntxt{fill:var(--muted)}
.st-ext rect{fill:rgba(122,183,255,.10)}.st-ext .ntxt{fill:var(--blue)}
.st-comp rect{fill:var(--bg-elev-2)}.st-comp .ntxt{fill:var(--text)}
.st-sub rect{fill:var(--bg-soft)}.st-sub .ntxt{fill:var(--muted)}
.st-grp rect{fill:var(--bg-elev-2)}.st-grp .ntxt{fill:var(--text)}
.st-root rect{fill:var(--cyan-soft)}.st-root .ntxt{fill:var(--cyan)}
.st-grp text,.st-root text{font-weight:700}
#map.dim .conn:not(.hl){opacity:.18}
#map.dim .node-g:not(.hl) rect{opacity:.3}#map.dim .node-g:not(.hl) text{opacity:.3}
.conn.hl{stroke:var(--cyan);stroke-width:2.2}
.foot{margin-top:24px;font:400 11px var(--mono);color:var(--muted-2);text-align:center}
.diagram-wide #view-diagram{width:100vw;margin-left:calc(50% - 50vw);padding:0 18px}
.diagram-shell:fullscreen{border-radius:0;background:var(--bg)}
.diagram-shell:fullscreen .map-viewport{height:calc(100vh - 54px)}
.pv-body{flex:1;min-height:0;background:var(--bg)}
.pv-body iframe{width:100%;height:64vh;border:0;display:block;background:#fff}
.pv-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;border-top:1px solid var(--line)}
.pv-url{font:400 11px var(--mono);color:var(--muted-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pv-msg{padding:48px 22px;text-align:center;color:var(--muted);font:400 13px/1.6 var(--sans)}
.node[data-url]{cursor:pointer}
[hidden]{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <div class="kicker">// Arquitectura</div>
      <h1 id="title">Árbol del sitio — yiqi.com.ar</h1>
      <div class="sub" id="subtitle"></div>
    </div>
    <div class="toolbar">
      <div class="sb-theme-switch" role="group" aria-label="Tema de color">
        <button class="theme-opt" type="button" data-val="dark" aria-label="Oscuro"><svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg></button>
        <button class="theme-opt" type="button" data-val="system" aria-label="Sistema"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></button>
        <button class="theme-opt" type="button" data-val="light" aria-label="Claro"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg></button>
      </div>
    </div>
  </div>

  <div class="bars">
    <div class="bars-left">
      <div class="pr-tabbar" role="tablist" aria-label="Árbol">
        <button class="pr-tabbtn" role="tab" aria-selected="true"  data-subject="site">Sitio</button>
        <button class="pr-tabbtn" role="tab" aria-selected="false" data-subject="ds">Design System</button>
      </div>
      <div class="pr-tabbar" role="tablist" aria-label="Vista">
        <button class="pr-tabbtn" role="tab" aria-selected="false" data-view="list">Lista</button>
        <button class="pr-tabbtn" role="tab" aria-selected="true"  data-view="diagram">Diagrama</button>
      </div>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <div id="view-list" hidden><div class="tree" id="tree"></div></div>

  <div id="view-diagram">
    <div class="diagram-shell">
      <div class="diagram-top">
        <div class="pr-tabbar" role="tablist" aria-label="Disposición">
          <button class="pr-tabbtn" role="tab" aria-selected="true"  data-layout="h">Horizontal</button>
          <button class="pr-tabbtn" role="tab" aria-selected="false" data-layout="r">Radial</button>
          <button class="pr-tabbtn" role="tab" aria-selected="false" data-layout="v">Vertical</button>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="dg-hint">rueda = zoom · arrastrar = mover · click = abrir</span>
          <div class="zoomctl"><button id="zout">−</button><button id="zfit" style="font-size:11px;width:auto;padding:0 10px">Ajustar</button><button id="zin">+</button><button id="zfull" title="Pantalla completa" style="font-size:13px">⛶</button></div>
        </div>
      </div>
      <div class="map-viewport" id="vpwrap"><svg id="map" xmlns="http://www.w3.org/2000/svg"><g id="vp"></g></svg></div>
    </div>
  </div>

  <div class="foot">Documento interno — no publicar. DS consumido de yiqi-imagen (CDN). Generado el 18/06/2026.</div>
</div>

  <div class="sc-modal" id="preview" aria-hidden="true">
    <div class="sc-modal-card" role="dialog" aria-modal="true" aria-labelledby="pvTitle" style="width:min(100%,1080px)">
      <div class="sc-modal-head">
        <div><div class="sc-modal-kicker" id="pvKicker">Vista previa</div><div class="sc-modal-title" id="pvTitle">—</div></div>
        <button class="sc-modal-close" id="pvClose" aria-label="Cerrar">&#10005;</button>
      </div>
      <div class="pv-body" id="pvBody"></div>
      <div class="pv-foot"><span class="pv-url" id="pvUrl"></span><a class="btn btn-sm" id="pvOpen" target="_blank" rel="noopener">Abrir en pestaña ↗</a></div>
    </div>
  </div>

<script>
const BASE='https://yiqi.com.ar';
const CAT='https://diguardia.github.io/yiqi-imagen/yiqi-design-system.html';

/* ── Datos: SITIO ── */
const ROOT_SITE={label:'Home',sub:'/',url:BASE+'/',st:'root',children:[
 {label:'Navegación',st:'grp',children:[
  {label:'IA Ready',sub:'/ia-ready.html',st:'pub'},{label:'API Docs',sub:'/api-docs.html',st:'pub'},
  {label:'Novedades',sub:'/novedades.html',st:'pub'},{label:'Capacitaciones',sub:'/capacitaciones.html',st:'pub'},
  {label:'FAQ',sub:'/faq.html',st:'pub'},{label:'Acerca de',sub:'/acerca-de.html',st:'pub'},
  {label:'Ayuda ERP',sub:'/ayuda-erp.html',st:'pub'},{label:'Contacto',sub:'/contacto.html',st:'pub'}]},
 {label:'Showcase',desc:'embebidas en Home',st:'grp',children:[
  {label:'Panel ERP',sub:'/erp-panel.html',st:'pub'},{label:'Panel mobile',sub:'/erp-mobile.html',st:'pub'}]},
 {label:'Pre-lanzamiento',desc:'fuera del sitemap',st:'grp',children:[
  {label:'Marketplace',sub:'/marketplace.html',st:'pre',children:[{label:'Ficha app · Inventariado Mobile',sub:'/app.html',st:'pre'}]},{label:'Tienda Nube',sub:'/tiendanube.html',st:'pre'},
  {label:'Enviopack',sub:'/enviopack.html',st:'pre'},{label:'Interbanking',sub:'/interbanking.html',st:'pre'},
  {label:'Drubbit',sub:'/drubbit.html',st:'pre'},{label:'Sell2Ship',sub:'/sell2ship.html',st:'pre'},
  {label:'Tornado',sub:'/tornado.html',st:'pre'}]},
 {label:'Borradores',st:'grp',children:[
  {label:'SplitText',sub:'/efecto-splittext.html',st:'draft'}]},
 {label:'Sistema',st:'grp',children:[
  {label:'Gracias',sub:'/gracias.html',st:'sys'},{label:'404',sub:'/404.html',st:'sys'}]},
 {label:'Externos',st:'grp',children:[
  {label:'Login',sub:'me.yiqi.com.ar',url:'https://me.yiqi.com.ar',st:'ext'},
  {label:'Demo',sub:'calendly',url:'https://calendly.com/javierperez/meet-30-demo',st:'ext'},
  {label:'WhatsApp',sub:'wa.me',url:'https://wa.me/5491123727422',st:'ext'},
  {label:'LinkedIn',sub:'linkedin',url:'https://www.linkedin.com/company/yiqi-sa',st:'ext'},
  {label:'Instagram',sub:'instagram',url:'https://instagram.com/yiqisa',st:'ext'},
  {label:'YouTube',sub:'youtube',url:'https://youtube.com/@yiqi3369',st:'ext'}]}
]};

/* ── Datos: DESIGN SYSTEM (catálogo) ── */
const D=(label,a,children)=>({label,a,st:children?'grp':'comp',children});
const ROOT_DS={label:'Catálogo DS',sub:'v1.2.7',url:CAT,st:'root',children:[
 {label:'Inicio',st:'grp',children:[{label:'Showcase de ejemplos',a:'',url:CAT.replace('yiqi-design-system.html','examples/showcase.html'),st:'comp'}]},
 {label:'Fundamentos',st:'grp',children:[
  {label:'01 Logo & marca',a:'brand',st:'comp'},{label:'02 Colores',a:'colors',st:'comp'},
  {label:'03 Tipografía',a:'typography',st:'comp'},{label:'04 Espaciado',a:'spacing',st:'comp'},
  {label:'05 Border radius',a:'radius',st:'comp'},{label:'06 Efectos & sombras',a:'effects',st:'comp'},
  {label:'07 Motion',a:'motion',st:'comp'}]},
 {label:'Componentes',st:'grp',children:[
  {label:'08 Botones',a:'buttons',st:'comp',children:[{label:'Botón de cerrar',a:'close-btn',st:'sub'},{label:'Alert badge',a:'alert-badge',st:'sub'}]},
  {label:'09 Badges & tags',a:'badges',st:'comp',children:[{label:'Favorito (star)',a:'fav-star',st:'sub'}]},
  {label:'10 Inputs & formularios',a:'inputs',st:'comp'},{label:'11 Cards & KPIs',a:'cards',st:'comp'},
  {label:'12 Trust / Stats',a:'trust',st:'comp'},{label:'13 Navegación',a:'navigation',st:'comp'},
  {label:'14 Tablas',a:'tables',st:'comp'},{label:'15 Iconografía',a:'icons',st:'comp'},
  {label:'16 Elementos varios',a:'misc',st:'comp',children:[{label:'Avatar',a:'avatar',st:'sub'}]},
  {label:'17 Slider',a:'prim-slider',st:'comp'},{label:'18 Tabs',a:'prim-tabs',st:'comp'},
  {label:'19 Dialog',a:'prim-dialog',st:'comp'},{label:'20 Dropdown',a:'prim-dropdown',st:'comp'},
  {label:'21 Popover',a:'prim-popover',st:'comp'},{label:'22 Toast',a:'prim-toast',st:'comp'},
  {label:'23 Enlace cruzado',a:'ds-xref',st:'comp'}]},
 {label:'Patrones',st:'grp',children:[
  {label:'24 Contador animado',a:'counter',st:'comp'},{label:'25 Animación de gráficos',a:'chart-anim',st:'comp'},
  {label:'26 Tabla implementación',a:'implementacion',st:'comp'},{label:'27 LLM FAB',a:'llm-fab',st:'comp'},
  {label:'28 Demo form',a:'demo-form',st:'comp'}]},
 {label:'Layout',st:'grp',children:[
  {label:'29 Grid & layout',a:'grid',st:'comp'},{label:'30 Grilla cuadriculada',a:'bg-grid',st:'comp'},
  {label:'31 Depth stack',a:'depth-stack',st:'comp'}]},
 {label:'Aplicaciones',st:'grp',children:[
  {label:'32 Apps · Overview',a:'app-overview',st:'comp'},
  {label:'33 Apps · Shell',a:'app-shell',st:'comp',children:[{label:'Switch de tema',a:'theme-switch',st:'sub'}]},
  {label:'34 Apps · Login',a:'login',st:'comp'},
  {label:'35 Panel Gerencial',a:'panel-gerencial',st:'comp',children:[{label:'Selector de período',a:'period-filter',st:'sub'}]},
  {label:'36 Picking · primitivos',a:'apps-picking',st:'comp'}]},
 {label:'Web',st:'grp',children:[
  {label:'37 Banner Analytics Pro',a:'web-banner',st:'comp'},{label:'38 Scrollbars',a:'scrollbars',st:'comp'}]},
 {label:'Marketplace',st:'grp',children:[
  {label:'39 Header de ficha',a:'mb-fhead',st:'comp'},{label:'40 Card de pricing',a:'mb-price',st:'comp'},
  {label:'41 Card de detalles',a:'mb-details',st:'comp'},{label:'42 Card de desarrollador',a:'mb-dev',st:'comp'},
  {label:'43 Menú de compartir',a:'mb-share',st:'comp'},{label:'44 Card de catálogo',a:'mb-appcard',st:'comp'},
  {label:'45 Reseñas',a:'mb-reviews',st:'comp'},{label:'46 Homologación',a:'mb-homo',st:'comp'},
  {label:'47 Banners de apps',a:'app-banners',st:'comp'}]}
]};

const SUBJ={
 site:{root:ROOT_SITE,kind:'site',title:'Árbol del sitio — yiqi.com.ar',sub:'22 páginas · 11 públicas · 8 pre-lanzamiento · 1 borrador · 2 de sistema',
   legend:'<span class="badge badge-green">Pública</span><span class="badge badge-amber">Pre-lanzamiento</span><span class="badge badge-cyan">Borrador</span><span class="badge">Sistema</span><span class="badge badge-blue">Externo</span>'},
 ds:{root:ROOT_DS,kind:'ds',title:'Árbol del Design System — catálogo v1.2.7',sub:'8 grupos · 47 secciones documentadas · fuente: yiqi-imagen',
   legend:'<span class="badge badge-cyan">Grupo</span><span class="badge">Componente</span><span class="badge badge-blue">Sub-componente</span>'}
};

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function urlOf(n){ if(n.url) return n.url; if(n.sub&&n.sub[0]==='/') return BASE+n.sub; if(n.a) return CAT+'#'+n.a; return null; }
const BADGE={pub:['pública','badge-green'],pre:['pre-lanzam.','badge-amber'],draft:['borrador','badge-cyan'],sys:['sistema','badge'],ext:['externo','badge-blue']};

/* ── LISTA (data-driven) ── */
function row(n,kind,sub){
  const href=urlOf(n), path=kind==='site'?(n.sub||''):(n.a?('#'+n.a):'');
  let badge='';
  if(kind==='site'&&BADGE[n.st]){ const b=BADGE[n.st]; badge=`<span class="badge ${b[1]}">${b[0]}</span>`; }
  const cls='node'+(sub?' sub':''), tag=href?'a':'div', attrs=href?` href="${href}" data-url="${href}" data-label="${esc(n.label)}" data-path="${esc(path)}" target="_blank" rel="noopener"`:'';
  return `<${tag} class="${cls}"${attrs}><span class="nlabel">${esc(n.label)}</span>${path?`<span class="npath">${esc(path)}</span>`:''}${badge}</${tag}>`;
}
function renderList(d){
  const r=d.root; let h='';
  const ru=urlOf(r);
  h+=`<a class="node root-node st-root"${ru?` href="${ru}" target="_blank" rel="noopener"`:''}><span class="nlabel">${esc(r.label)}</span><span class="npath">${esc(r.sub||'')}</span></a>`;
  r.children.forEach((g,gi)=>{
    let body='';
    g.children.forEach(it=>{ body+=row(it,d.kind,false); (it.children||[]).forEach(s=>body+=row(s,d.kind,true)); });
    h+=`<details class="group"${gi<4?' open':''}><summary><svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>${esc(g.label)}${g.desc?`<span class="group-desc">— ${esc(g.desc)}</span>`:''}<span class="group-count">${g.children.length}</span></summary><div class="group-body">${body}</div></details>`;
  });
  document.getElementById('tree').innerHTML=h;
}

/* ── DIAGRAMA ── */
const svg=document.getElementById('map'),vp=document.getElementById('vp'),vpwrap=document.getElementById('vpwrap');
let M=null, CUR='h', view={k:1,tx:0,ty:0}, dims={w:1000,h:800};
function prepare(root){
  const nodes=[]; let i=0;
  (function flat(n,p){ n._i=i++; n.parent=p; n.children=n.children||[]; nodes.push(n); n.children.forEach(c=>flat(c,n)); })(root,null);
  let l=0;
  (function pos(n,d){ n.depth=d; if(n.children.length){ n.children.forEach(c=>pos(c,d+1)); n.pos=(n.children[0].pos+n.children[n.children.length-1].pos)/2; } else n.pos=l++; })(root,0);
  nodes.forEach(n=>{ n.w=Math.max(56,n.label.length*7+22); n.h=30; });
  return {nodes,L:l,maxD:Math.max.apply(null,nodes.map(n=>n.depth))};
}
function layout(kind){
  const N=M.nodes;
  if(kind==='h'){ const DX=235,DY=34,MX=110,MY=44; N.forEach(n=>{n.x=MX+n.depth*DX;n.y=MY+n.pos*DY;}); return {w:MX+M.maxD*DX+210,h:MY*2+(M.L-1)*DY}; }
  if(kind==='v'){ const DX=135,DY=120,MX=90,MY=60; N.forEach(n=>{n.x=MX+n.pos*DX;n.y=MY+n.depth*DY;}); return {w:MX*2+(M.L-1)*DX,h:MY+M.maxD*DY+90}; }
  const DR=200,R=M.maxD*DR,cx=R+150,cy=R+150; N.forEach(n=>{const r=n.depth*DR,a=(n.pos/M.L)*2*Math.PI; n.x=cx+r*Math.sin(a); n.y=cy-r*Math.cos(a);}); return {w:cx*2,h:cy*2};
}
function edge(p,n,kind){ const px=p.x,py=p.y,nx=n.x,ny=n.y;
  if(kind==='h'){ const x1=px+p.w/2,x2=nx-n.w/2,mx=(x1+x2)/2; return `M${x1} ${py} C ${mx} ${py} ${mx} ${ny} ${x2} ${ny}`; }
  if(kind==='v'){ const y1=py+p.h/2,y2=ny-n.h/2,my=(y1+y2)/2; return `M${px} ${y1} C ${px} ${my} ${nx} ${my} ${nx} ${y2}`; }
  const mx=(px+nx)/2,my=(py+ny)/2; return `M${px} ${py} Q ${mx} ${my} ${nx} ${ny}`;
}
function render(kind){
  CUR=kind; dims=layout(kind); const N=M.nodes;
  let c='',g='';
  N.forEach(n=>{ if(n.parent) c+=`<path class="conn" data-to="${n._i}" d="${edge(n.parent,n,kind)}"/>`; });
  N.forEach(n=>{ const half=n.w/2,hh=n.h/2; g+=`<g class="node-g st-${n.st}" data-i="${n._i}" transform="translate(${n.x-half},${n.y-hh})"><rect width="${n.w}" height="${n.h}"/><text class="ntxt" x="${half}" y="${hh}" text-anchor="middle">${esc(n.label)}</text></g>`; });
  vp.innerHTML=`<g class="conns">${c}</g><g class="nodes">${g}</g>`;
  fit(); drawAnim(); wireNodes();
}
function applyT(){ vp.setAttribute('transform',`translate(${view.tx},${view.ty}) scale(${view.k})`); }
function fit(){ const r=vpwrap.getBoundingClientRect(),pad=40,k=Math.min((r.width-pad)/dims.w,(r.height-pad)/dims.h);
  view.k=Math.max(.1,Math.min(k,1.4)); view.tx=(r.width-dims.w*view.k)/2; view.ty=(r.height-dims.h*view.k)/2; applyT(); }
function drawAnim(){
  vp.querySelectorAll('.conn').forEach(p=>{ const len=p.getTotalLength(); p.style.strokeDasharray=len; p.style.strokeDashoffset=len; requestAnimationFrame(()=>{ p.style.transition='stroke-dashoffset .7s ease'; p.style.strokeDashoffset=0; }); });
  vp.querySelectorAll('.node-g').forEach((el,i)=>{ el.style.opacity=0; el.style.transition='opacity .4s ease'; setTimeout(()=>el.style.opacity=1,100+i*10); });
}
function ancestors(i){ const o=[]; let n=M.nodes[i]; while(n){o.push(n._i);n=n.parent;} return o; }
function wireNodes(){
  vp.querySelectorAll('.node-g').forEach(el=>{
    const i=+el.dataset.i,n=M.nodes[i];
    el.addEventListener('mouseenter',()=>{ svg.classList.add('dim'); ancestors(i).forEach(pi=>{ const ne=vp.querySelector(`.node-g[data-i="${pi}"]`); if(ne)ne.classList.add('hl'); const ce=vp.querySelector(`.conn[data-to="${pi}"]`); if(ce)ce.classList.add('hl'); }); });
    el.addEventListener('mouseleave',()=>{ svg.classList.remove('dim'); vp.querySelectorAll('.hl').forEach(x=>x.classList.remove('hl')); });
    el.addEventListener('click',()=>{ if(urlOf(n)) openPreview(n.label, urlOf(n), n.sub||(n.a?('#'+n.a):'')); });
  });
}
vpwrap.addEventListener('wheel',e=>{ e.preventDefault(); const r=vpwrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,f=e.deltaY<0?1.12:1/1.12,nk=Math.max(.1,Math.min(view.k*f,3)); view.tx=mx-(mx-view.tx)*(nk/view.k); view.ty=my-(my-view.ty)*(nk/view.k); view.k=nk; applyT(); },{passive:false});
let drag=null;
vpwrap.addEventListener('pointerdown',e=>{ drag={x:e.clientX,y:e.clientY,tx:view.tx,ty:view.ty}; vpwrap.classList.add('grabbing'); vpwrap.setPointerCapture(e.pointerId); });
vpwrap.addEventListener('pointermove',e=>{ if(!drag)return; view.tx=drag.tx+(e.clientX-drag.x); view.ty=drag.ty+(e.clientY-drag.y); applyT(); });
vpwrap.addEventListener('pointerup',()=>{ drag=null; vpwrap.classList.remove('grabbing'); });
function zoom(f){ const r=vpwrap.getBoundingClientRect(),cx=r.width/2,cy=r.height/2,nk=Math.max(.1,Math.min(view.k*f,3)); view.tx=cx-(cx-view.tx)*(nk/view.k); view.ty=cy-(cy-view.ty)*(nk/view.k); view.k=nk; applyT(); }
document.getElementById('zin').onclick=()=>zoom(1.2);
document.getElementById('zout').onclick=()=>zoom(1/1.2);
document.getElementById('zfit').onclick=fit;

/* ── Estado y switches ── */
let CURD=SUBJ.site, diagramReady=false;
function applySubject(d){
  CURD=d;
  document.getElementById('title').textContent=d.title;
  document.getElementById('subtitle').textContent=d.sub;
  document.getElementById('legend').innerHTML=d.legend;
  renderList(d);
  M=prepare(d.root);
  if(!document.getElementById('view-diagram').hidden){ requestAnimationFrame(()=>render(CUR)); }
}
document.querySelectorAll('[data-subject]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-subject]').forEach(x=>x.setAttribute('aria-selected',x===b));
  applySubject(SUBJ[b.dataset.subject]);
}));
document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-view]').forEach(x=>x.setAttribute('aria-selected',x===b));
  const dg=b.dataset.view==='diagram';
  document.getElementById('view-list').hidden=dg;
  document.getElementById('view-diagram').hidden=!dg;
  if(dg) requestAnimationFrame(()=>render(CUR));
}));
document.querySelectorAll('[data-layout]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-layout]').forEach(x=>x.setAttribute('aria-selected',x===b));
  render(b.dataset.layout);
}));
document.querySelectorAll('.theme-opt').forEach(b=>b.addEventListener('click',()=>{
  if(window.YiQi&&YiQi.setTheme) YiQi.setTheme(b.dataset.val);
  else document.documentElement.dataset.theme=b.dataset.val==='system'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):b.dataset.val;
  document.querySelectorAll('.theme-opt').forEach(x=>x.classList.toggle('active',x===b));
}));
window.addEventListener('resize',()=>{ if(!document.getElementById('view-diagram').hidden) fit(); });

/* Pantalla completa */
const shell=document.querySelector('.diagram-shell');
document.getElementById('zfull').onclick=()=>{ if(!document.fullscreenElement){ (shell.requestFullscreen?shell.requestFullscreen():shell.webkitRequestFullscreen&&shell.webkitRequestFullscreen()); } else { document.exitFullscreen(); } };
document.addEventListener('fullscreenchange',()=>requestAnimationFrame(fit));

/* Full-bleed cuando el diagrama está visible */
function syncWide(){ document.body.classList.toggle('diagram-wide', !document.getElementById('view-diagram').hidden); }
document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{ syncWide(); requestAnimationFrame(fit); }));

/* ── Preview modal ── */
const modal=document.getElementById('preview'),pvBody=document.getElementById('pvBody'),pvTitle=document.getElementById('pvTitle'),pvUrl=document.getElementById('pvUrl'),pvOpen=document.getElementById('pvOpen');
function frameable(url){ try{ if(url.indexOf('mailto:')===0) return false; const h=new URL(url).host; return /(^|\.)yiqi\.com\.ar$/.test(h)||h==='diguardia.github.io'; }catch(e){ return false; } }
function openPreview(label,url,path){
  if(!url) return;
  pvTitle.textContent=label; pvUrl.textContent=url; pvOpen.href=url;
  if(frameable(url)) pvBody.innerHTML='<iframe src="'+url+'" title="'+esc(label)+'" loading="lazy" referrerpolicy="no-referrer"></iframe>';
  else pvBody.innerHTML='<div class="pv-msg">Vista previa no disponible para destinos externos.<br>Usá <b>Abrir en pestaña</b>.</div>';
  modal.classList.add('open'); modal.setAttribute('aria-hidden','false');
}
function closePreview(){ modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); pvBody.innerHTML=''; }
document.getElementById('pvClose').onclick=closePreview;
modal.addEventListener('click',function(e){ if(e.target===modal) closePreview(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape'&&modal.classList.contains('open')) closePreview(); });
document.getElementById('tree').addEventListener('click',function(e){ const a=e.target.closest('.node[data-url]'); if(a){ e.preventDefault(); openPreview(a.dataset.label,a.dataset.url,a.dataset.path); } });

/* init: Sitio + Diagrama */
applySubject(SUBJ.site);
syncWide();
requestAnimationFrame(()=>render('h'));
</script>
</body>
